name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: "false"

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Deploy
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'consultation-app' }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_openrouter_base_url: ${{ vars.OPENROUTER_BASE_URL || 'https://openrouter.ai/api/v1' }}
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_clerk_jwks_url: ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_next_public_clerk_publishable_key: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: chmod +x scripts/deploy.sh && ./scripts/deploy.sh "${TF_VAR_environment}" "${TF_VAR_project_name}"

      - name: Deployment URL
        working-directory: terraform
        run: |
          echo "App Runner: $(terraform output -raw app_runner_service_url)"
          echo "ECR: $(terraform output -raw ecr_repository_url)"
